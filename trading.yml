name: Trading Alert

on:
  schedule:
    - cron: "5 0 * * 1-5"    # 한국시간 09:05 평일
    - cron: "0 3 * * 1-5"    # 한국시간 12:00 평일
    - cron: "20 6 * * 1-5"   # 한국시간 15:20 평일
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  run-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 알림 실행
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PW:  ${{ secrets.GMAIL_APP_PW }}
          TO_EMAILS:     ${{ secrets.TO_EMAILS }}
        run: python trading_alert.py
